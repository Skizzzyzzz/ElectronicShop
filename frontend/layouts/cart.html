<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart - ElectronicShop</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
    header { background-color: #333; color: white; padding: 10px 20px; }
    nav { display: flex; justify-content: space-between; align-items: center; }
    nav a { color: white; text-decoration: none; margin: 0 15px; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { color: #333; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #f2f2f2; }
    input[type="number"] { width: 60px; padding: 5px; }
    button { background-color: #4CAF50; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
    button:hover { background-color: #45a049; }
    .remove-btn { background-color: #f44336; }
    .remove-btn:hover { background-color: #da190b; }
    #checkoutBtn { display: block; margin: 20px auto; padding: 12px 24px; font-size: 16px; }
    footer { text-align: center; padding: 10px; background-color: #333; color: white; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <div>
        <a href="/catalog">Catalog</a>
        <a href="/cart">Cart</a>
        <a href="/account">Account</a>
      </div>
      <div>
        <span>ElectronicShop</span>
      </div>
    </nav>
  </header>
  <div class="container">
    <h1>Shopping Cart</h1>
    <table id="cartTable">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cartItems">
        <!-- Cart items will be loaded here -->
      </tbody>
    </table>
    <div id="cartTotal" style="text-align: right; font-size: 18px; font-weight: bold;">
      <!-- Total will be shown here -->
    </div>
    <button id="checkoutBtn">Proceed to Checkout</button>
  </div>
  <footer>
    <p>&copy; 2026 ElectronicShop. All rights reserved.</p>
  </footer>

  <script>
    function getUserId() {
      return localStorage.getItem('user_id');
    }

    async function loadCart() {
      const userId = getUserId();
      const url = userId ? `/api/cart?user_id=${encodeURIComponent(userId)}` : '/api/cart';
      const response = await fetch(url);
      const data = await response.json();
      console.log('[WEB] loadCart', { userId, url, data });
      const tbody = document.getElementById('cartItems');
      tbody.innerHTML = '';
      data.items.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.product.name}</td>
          <td>$${item.product.price}</td>
          <td><input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${item.product.id}, this.value)"></td>
          <td>$${item.product.price * item.quantity}</td>
          <td><button class="remove-btn" onclick="removeItem(${item.product.id})">Remove</button></td>
        `;
        tbody.appendChild(row);
      });
      document.getElementById('cartTotal').innerHTML = `Total: $${data.total}`;
    }

    document.getElementById('checkoutBtn').addEventListener('click', async function() {
      const userId = getUserId();
      const response = await fetch('/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      const result = await response.json();
      console.log('[WEB] checkout', { userId, result });
      alert(result.message);
      if (result.status === 'success') {
        loadCart(); // Reload cart
      }
    });

    async function removeItem(productId) {
      const userId = getUserId();
      const response = await fetch('/cart/items', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, userId })
      });
      const result = await response.json();
      console.log('[WEB] removeItem', { userId, productId, result });
      alert(result.message);
      loadCart();
    }

    async function updateQuantity(productId, quantity) {
      const userId = getUserId();
      const response = await fetch('/cart/items', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, quantity: parseInt(quantity), userId })
      });
      const result = await response.json();
      console.log('[WEB] updateQuantity', { userId, productId, quantity: parseInt(quantity), result });
      alert(result.message);
      loadCart();
    }

    window.onload = loadCart;
  </script>
</body>
</html>
